<!DOCTYPE html>
<html>
    <head>
        <title>Setup PIN</title>
        <style>
            body { font-family: Arial, sans-serif; background: #f3f4f6; margin: 0; padding: 40px; }
            .card { max-width: 480px; margin: 40px auto; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
            h2 { margin-top: 0; }
            form p { margin-bottom: 12px; }
            input { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; }
            button { width: 100%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; }
        </style>
    </head>
    <body>
        <div class="card">
            <h2>Step 2 of 4</h2>
            <h3>Create Your 6-digit PIN</h3>

            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Continue</button>
            </form>
        </div>
    </body>
</html>
