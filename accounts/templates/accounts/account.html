<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f7f8fb; color: #1f2937; }
        .card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); max-width: 760px; }
        .box { padding: 14px; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 10px; }
        .btn { display: inline-block; margin-top: 16px; padding: 10px 16px; background: #2563eb; color: white; text-decoration: none; border-radius: 8px; }
        .btn.secondary { background: #4b5563; margin-left: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Account Details</h1>
        <p>View your basic account information here.</p>

        <div class="box">
            <strong>Username:</strong> {{ user.username }}
        </div>
        <div class="box">
            <strong>Email:</strong> {{ user.email|default:"Not provided" }}
        </div>
        <div class="box">
            <strong>Last login:</strong> {{ user.last_login|default:"Not available" }}
        </div>

        <a class="btn" href="{% url 'dashboard' %}">Back to Dashboard</a>
        <a class="btn secondary" href="{% url 'logout' %}">Log out</a>
    </div>
</body>
</html>
